version: 2

sources:
  - name: raw
    description: >
      Raw tables loaded directly from the synthetic CSVs by
      python/etl/load_to_duckdb.py, with no cleaning applied. In production
      this would be the Snowflake schema that Fivetran/Airbyte/COPY INTO
      lands data into before dbt takes over.
    schema: raw
    tables:
      - name: customers
        description: One row per customer as generated by the synthetic data source.
      - name: transactions
        description: One row per transaction as generated by the synthetic data source.
      - name: support_tickets
        description: One row per support ticket as generated by the synthetic data source.
